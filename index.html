<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High School Science Course Planner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-background-primary: #ffffff;
            --color-background-secondary: #f8f8f8;
            --color-background-tertiary: #f0f0f0;
            --color-background-info: #e6f1fb;
            --color-background-success: #eaf3de;
            --color-background-warning: #faeeda;
            --color-background-danger: #fcebeb;
            
            --color-text-primary: #1a1a1a;
            --color-text-secondary: #666666;
            --color-text-tertiary: #999999;
            --color-text-info: #0c447c;
            --color-text-success: #27500a;
            --color-text-warning: #633806;
            --color-text-danger: #791f1f;
            
            --color-border-primary: #cccccc;
            --color-border-secondary: #e0e0e0;
            --color-border-tertiary: #e8e8e8;
            --color-border-info: #85b7eb;
            --color-border-success: #97c459;
            --color-border-warning: #ef9f27;
            --color-border-danger: #f09595;
            
            --border-radius-md: 8px;
            --border-radius-lg: 12px;
            --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
            --font-serif: Georgia, serif;
            --font-mono: "Monaco", "Menlo", monospace;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --color-background-primary: #1a1a1a;
                --color-background-secondary: #2a2a2a;
                --color-background-tertiary: #333333;
                --color-background-info: #042c53;
                --color-background-success: #173404;
                --color-background-warning: #412402;
                --color-background-danger: #501313;
                
                --color-text-primary: #ffffff;
                --color-text-secondary: #cccccc;
                --color-text-tertiary: #999999;
                --color-text-info: #85b7eb;
                --color-text-success: #97c459;
                --color-text-warning: #ef9f27;
                --color-text-danger: #f09595;
                
                --color-border-primary: #444444;
                --color-border-secondary: #555555;
                --color-border-tertiary: #333333;
                --color-border-info: #185fa5;
                --color-border-success: #3b6d11;
                --color-border-warning: #ba7517;
                --color-border-danger: #a32d2d;
            }
        }

        html, body {
            height: 100%;
            font-family: var(--font-sans);
            background: var(--color-background-primary);
            color: var(--color-text-primary);
        }

        #root {
            min-height: 100vh;
            background: var(--color-background-primary);
        }

        button {
            font-family: var(--font-sans);
            cursor: pointer;
        }

        input, select, textarea {
            font-family: var(--font-sans);
        }

        a {
            color: var(--color-text-info);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel">
        const { useState } = React;

        const ScienceCoursePlanner = () => {
            const [screen, setScreen] = useState('welcome');
            const [careerPath, setCareerPath] = useState(null);
            const [interests, setInterests] = useState([]);

            const courseData = {
                college: {
                    title: '4-Year College/University',
                    subtitle: 'Prepare for competitive college admissions and STEM majors',
                    interests: [
                        { id: 'biology-health', label: 'Biology & Health Sciences', icon: '🔬' },
                        { id: 'chemistry', label: 'Chemistry & Materials', icon: '⚗️' },
                        { id: 'physics-engineering', label: 'Physics & Engineering', icon: '⚙️' },
                        { id: 'environmental', label: 'Environmental/Earth Science', icon: '🌍' },
                    ],
                    pathways: {
                        'biology-health': {
                            name: 'Biology & Health Sciences Path',
                            description: 'Pre-med, nursing, veterinary, biomedical sciences',
                            courses: [
                                { grade: 9, course: 'Honors Biology', priority: 'essential', reason: 'Foundation for all health sciences' },
                                { grade: 10, course: 'Honors Chem', priority: 'essential', reason: 'Required for pre-med requirements' },
                                { grade: 11, course: 'Honors Chem 2 or AP Physics 1', priority: 'strongly recommended', reason: 'Demonstrates rigor' },
                                { grade: 11, course: 'Honors Anatomy', priority: 'essential', reason: 'Direct preparation for medical fields' },
                                { grade: 12, course: 'AP Physics 1 (if not taken in 11)', priority: 'recommended', reason: 'Strengthen science portfolio' },
                            ],
                        },
                        'chemistry': {
                            name: 'Chemistry & Materials Path',
                            description: 'Chemistry, materials science, chemical engineering',
                            courses: [
                                { grade: 9, course: 'Honors Biology or Biology', priority: 'essential', reason: 'General science foundation' },
                                { grade: 10, course: 'Honors Chem', priority: 'essential', reason: 'Core requirement for chemistry majors' },
                                { grade: 11, course: 'Honors Chem 2', priority: 'essential', reason: 'Advanced chemistry preparation' },
                                { grade: 11, course: 'AP Physics 1', priority: 'strongly recommended', reason: 'Essential for materials science' },
                                { grade: 12, course: 'Organic Chemistry', priority: 'essential', reason: 'College chemistry prerequisite' },
                            ],
                        },
                        'physics-engineering': {
                            name: 'Physics & Engineering Path',
                            description: 'Engineering, physics, computer science, aerospace',
                            courses: [
                                { grade: 9, course: 'Honors Biology or Biology', priority: 'recommended', reason: 'Completes science requirements' },
                                { grade: 10, course: 'Honors Chem', priority: 'essential', reason: 'Foundation for physics prerequisites' },
                                { grade: 11, course: 'AP Physics 1', priority: 'essential', reason: 'Core for engineering programs' },
                                { grade: 11, course: 'Honors Chem 2 (optional)', priority: 'recommended', reason: 'Additional rigor' },
                                { grade: 12, course: 'Physics or additional advanced course', priority: 'recommended', reason: 'Demonstrate sustained STEM commitment' },
                            ],
                        },
                        'environmental': {
                            name: 'Environmental & Earth Science Path',
                            description: 'Environmental science, geology, meteorology, conservation',
                            courses: [
                                { grade: 9, course: 'Biology or Honors Biology', priority: 'essential', reason: 'Ecosystem and ecology foundation' },
                                { grade: 10, course: 'Physical Science or Chem', priority: 'strongly recommended', reason: 'Earth processes understanding' },
                                { grade: 11, course: 'Physics', priority: 'recommended', reason: 'Earth systems and energy' },
                                { grade: 12, course: 'Any additional science', priority: 'recommended', reason: 'Demonstrate broad science background' },
                            ],
                        },
                    },
                },
                tradeschool: {
                    title: 'Trade School/Technical Program',
                    subtitle: 'Prepare for skilled trades and technical certifications',
                    interests: [
                        { id: 'construction-hvac', label: 'Construction & HVAC', icon: '🔧' },
                        { id: 'electrical-plumbing', label: 'Electrical & Plumbing', icon: '⚡' },
                        { id: 'automotive', label: 'Automotive & Mechanics', icon: '🚗' },
                        { id: 'welding-manufacturing', label: 'Welding & Manufacturing', icon: '🛠️' },
                    ],
                    pathways: {
                        'construction-hvac': {
                            name: 'Construction & HVAC Path',
                            description: 'HVAC technician, construction management, building trades',
                            courses: [
                                { grade: 9, course: 'Biology or Physical Science', priority: 'recommended', reason: 'Complete science requirement' },
                                { grade: 10, course: 'Physical Science or Regular Chem', priority: 'strongly recommended', reason: 'Thermodynamics and pressure systems' },
                                { grade: 11, course: 'Physics', priority: 'recommended', reason: 'Understand mechanical systems' },
                                { grade: 12, course: 'Any science course', priority: 'optional', reason: 'Strengthen technical foundation' },
                            ],
                        },
                        'electrical-plumbing': {
                            name: 'Electrical & Plumbing Path',
                            description: 'Electrician, plumber, electrical systems technician',
                            courses: [
                                { grade: 9, course: 'Biology or Physical Science', priority: 'recommended', reason: 'General science background' },
                                { grade: 10, course: 'Physical Science or Chem', priority: 'strongly recommended', reason: 'Electrical and circuit fundamentals' },
                                { grade: 11, course: 'Physics', priority: 'essential', reason: 'Electricity and magnetism core concepts' },
                                { grade: 12, course: 'Any science', priority: 'optional', reason: 'Additional technical preparation' },
                            ],
                        },
                        'automotive': {
                            name: 'Automotive & Mechanics Path',
                            description: 'Automotive technician, diesel mechanic, powersports',
                            courses: [
                                { grade: 9, course: 'Biology or Physical Science', priority: 'recommended', reason: 'Complete requirements' },
                                { grade: 10, course: 'Physical Science or Regular Chem', priority: 'strongly recommended', reason: 'Properties of materials' },
                                { grade: 11, course: 'Physics', priority: 'strongly recommended', reason: 'Motion, forces, and energy transfer' },
                            ],
                        },
                        'welding-manufacturing': {
                            name: 'Welding & Manufacturing Path',
                            description: 'Welder, CNC machinist, manufacturing technician',
                            courses: [
                                { grade: 9, course: 'Physical Science or Biology', priority: 'recommended', reason: 'Technical foundation' },
                                { grade: 10, course: 'Regular Chem or Physical Science', priority: 'strongly recommended', reason: 'Materials properties and reactions' },
                                { grade: 11, course: 'Physics', priority: 'recommended', reason: 'Precision, measurement, and mechanics' },
                            ],
                        },
                    },
                },
                workforce: {
                    title: 'Direct Workforce Entry',
                    subtitle: 'Enter job market after high school with practical skills',
                    interests: [
                        { id: 'skilled-trades', label: 'Skilled Trades', icon: '🏗️' },
                        { id: 'service-industry', label: 'Service & Hospitality', icon: '🏢' },
                        { id: 'military-public', label: 'Military/Public Service', icon: '🛡️' },
                        { id: 'entrepreneurship', label: 'Entrepreneurship', icon: '💼' },
                    ],
                    pathways: {
                        'skilled-trades': {
                            name: 'Skilled Trades Path',
                            description: 'Apprenticeships, on-the-job training in specialized trades',
                            courses: [
                                { grade: 9, course: 'Biology or Physical Science', priority: 'recommended', reason: 'Meet graduation requirements' },
                                { grade: 10, course: 'Physical Science', priority: 'recommended', reason: 'Practical application of physical concepts' },
                                { grade: 11, course: 'Physics or Forensic Science', priority: 'recommended', reason: 'Hands-on, practical science experience' },
                            ],
                        },
                        'service-industry': {
                            name: 'Service & Hospitality Path',
                            description: 'Management, customer service, business operations',
                            courses: [
                                { grade: 9, course: 'Biology or Physical Science', priority: 'recommended', reason: 'Complete science requirement' },
                                { grade: 10, course: 'Any science course', priority: 'recommended', reason: 'Practical science literacy' },
                                { grade: 11, course: 'Forensic Science or Physics', priority: 'optional', reason: 'Science elective of interest' },
                            ],
                        },
                        'military-public': {
                            name: 'Military/Public Service Path',
                            description: 'Military service, law enforcement, firefighting, EMT',
                            courses: [
                                { grade: 9, course: 'Biology', priority: 'strongly recommended', reason: 'Health and human systems' },
                                { grade: 10, course: 'Physical Science or Chem', priority: 'recommended', reason: 'Technical understanding' },
                                { grade: 11, course: 'Forensic Science or Physics', priority: 'recommended', reason: 'Practical investigation skills' },
                            ],
                        },
                        'entrepreneurship': {
                            name: 'Entrepreneurship Path',
                            description: 'Starting a business, self-employment, business ownership',
                            courses: [
                                { grade: 9, course: 'Biology or Physical Science', priority: 'recommended', reason: 'Meet requirements, choose by interest' },
                                { grade: 10, course: 'Any science of interest', priority: 'recommended', reason: 'Follow your passion' },
                                { grade: 11, course: 'Any science of interest', priority: 'optional', reason: 'Explore what excites you' },
                            ],
                        },
                    },
                },
            };

            const handleCareerSelect = (path) => {
                setCareerPath(path);
                setScreen('interests');
            };

            const handleInterestSelect = (interestId) => {
                setInterests([interestId]);
                setScreen('recommendations');
            };

            const handleReset = () => {
                setCareerPath(null);
                setInterests([]);
                setScreen('welcome');
            };

            const renderWelcome = () => (
                <div style={{ maxWidth: '800px', margin: '0 auto', padding: '2rem 1rem' }}>
                    <div style={{ textAlign: 'center', marginBottom: '3rem' }}>
                        <h1 style={{ fontSize: '28px', fontWeight: '500', marginBottom: '0.5rem', color: 'var(--color-text-primary)' }}>
                            Science course planner
                        </h1>
                        <p style={{ fontSize: '16px', color: 'var(--color-text-secondary)', lineHeight: '1.6', marginBottom: '0.5rem' }}>
                            Let's find your best path through high school science
                        </p>
                        <p style={{ fontSize: '14px', color: 'var(--color-text-tertiary)' }}>
                            Select your post-graduation goal to get personalized course recommendations
                        </p>
                    </div>

                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: '16px', marginBottom: '2rem' }}>
                        {[
                            { id: 'college', title: '4-Year College', desc: 'University or bachelor degree', icon: '🎓' },
                            { id: 'tradeschool', title: 'Trade School', desc: 'Technical certification', icon: '⚙️' },
                            { id: 'workforce', title: 'Direct Workforce', desc: 'Enter job market', icon: '💼' },
                        ].map(path => (
                            <button
                                key={path.id}
                                onClick={() => handleCareerSelect(path.id)}
                                style={{
                                    background: 'var(--color-background-primary)',
                                    border: '1px solid var(--color-border-tertiary)',
                                    borderRadius: 'var(--border-radius-lg)',
                                    padding: '1.5rem 1rem',
                                    cursor: 'pointer',
                                    textAlign: 'center',
                                    transition: 'all 0.2s',
                                }}
                                onMouseEnter={(e) => {
                                    e.currentTarget.style.borderColor = 'var(--color-border-secondary)';
                                    e.currentTarget.style.background = 'var(--color-background-secondary)';
                                }}
                                onMouseLeave={(e) => {
                                    e.currentTarget.style.borderColor = 'var(--color-border-tertiary)';
                                    e.currentTarget.style.background = 'var(--color-background-primary)';
                                }}
                            >
                                <div style={{ fontSize: '32px', marginBottom: '0.5rem' }}>{path.icon}</div>
                                <div style={{ fontSize: '16px', fontWeight: '500', marginBottom: '0.25rem', color: 'var(--color-text-primary)' }}>
                                    {path.title}
                                </div>
                                <div style={{ fontSize: '12px', color: 'var(--color-text-secondary)' }}>
                                    {path.desc}
                                </div>
                            </button>
                        ))}
                    </div>
                </div>
            );

            const renderInterests = () => {
                const currentPath = courseData[careerPath];
                return (
                    <div style={{ maxWidth: '800px', margin: '0 auto', padding: '2rem 1rem' }}>
                        <button
                            onClick={() => setScreen('welcome')}
                            style={{
                                background: 'transparent',
                                border: 'none',
                                color: 'var(--color-text-secondary)',
                                cursor: 'pointer',
                                fontSize: '14px',
                                marginBottom: '1.5rem',
                                padding: 0,
                            }}
                        >
                            ← Back to career paths
                        </button>

                        <div style={{ marginBottom: '2rem' }}>
                            <h2 style={{ fontSize: '22px', fontWeight: '500', marginBottom: '0.5rem', color: 'var(--color-text-primary)' }}>
                                {currentPath.title}
                            </h2>
                            <p style={{ fontSize: '14px', color: 'var(--color-text-secondary)', marginBottom: '1.5rem' }}>
                                {currentPath.subtitle}
                            </p>
                            <p style={{ fontSize: '15px', color: 'var(--color-text-primary)', fontWeight: '500', marginBottom: '1rem' }}>
                                What's your specific interest?
                            </p>
                        </div>

                        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(180px, 1fr))', gap: '12px' }}>
                            {currentPath.interests.map(interest => (
                                <button
                                    key={interest.id}
                                    onClick={() => handleInterestSelect(interest.id)}
                                    style={{
                                        background: 'var(--color-background-primary)',
                                        border: '1px solid var(--color-border-tertiary)',
                                        borderRadius: 'var(--border-radius-md)',
                                        padding: '1rem',
                                        cursor: 'pointer',
                                        textAlign: 'center',
                                        transition: 'all 0.2s',
                                    }}
                                    onMouseEnter={(e) => {
                                        e.currentTarget.style.borderColor = 'var(--color-border-info)';
                                        e.currentTarget.style.background = 'var(--color-background-info)';
                                    }}
                                    onMouseLeave={(e) => {
                                        e.currentTarget.style.borderColor = 'var(--color-border-tertiary)';
                                        e.currentTarget.style.background = 'var(--color-background-primary)';
                                    }}
                                >
                                    <div style={{ fontSize: '24px', marginBottom: '0.5rem' }}>{interest.icon}</div>
                                    <div style={{ fontSize: '13px', fontWeight: '500', color: 'var(--color-text-primary)' }}>
                                        {interest.label}
                                    </div>
                                </button>
                            ))}
                        </div>
                    </div>
                );
            };

            const renderRecommendations = () => {
                const currentPath = courseData[careerPath];
                const selectedInterest = interests[0];
                const pathway = currentPath.pathways[selectedInterest];

                return (
                    <div style={{ maxWidth: '900px', margin: '0 auto', padding: '2rem 1rem' }}>
                        <button
                            onClick={() => setScreen('interests')}
                            style={{
                                background: 'transparent',
                                border: 'none',
                                color: 'var(--color-text-secondary)',
                                cursor: 'pointer',
                                fontSize: '14px',
                                marginBottom: '1.5rem',
                                padding: 0,
                            }}
                        >
                            ← Change selection
                        </button>

                        <div style={{ marginBottom: '2rem' }}>
                            <h2 style={{ fontSize: '22px', fontWeight: '500', marginBottom: '0.5rem', color: 'var(--color-text-primary)' }}>
                                {pathway.name}
                            </h2>
                            <p style={{ fontSize: '14px', color: 'var(--color-text-secondary)', marginBottom: '1rem' }}>
                                {pathway.description}
                            </p>
                        </div>

                        <div style={{ background: 'var(--color-background-secondary)', borderRadius: 'var(--border-radius-lg)', padding: '1.5rem', marginBottom: '2rem' }}>
                            <h3 style={{ fontSize: '16px', fontWeight: '500', marginBottom: '1rem', color: 'var(--color-text-primary)' }}>
                                Recommended course sequence
                            </h3>
                            <div style={{ display: 'grid', gap: '12px' }}>
                                {pathway.courses.map((item, idx) => {
                                    const priorityColor = {
                                        essential: { bg: 'var(--color-background-info)', text: 'var(--color-text-info)', label: 'Essential' },
                                        'strongly recommended': { bg: 'var(--color-background-warning)', text: 'var(--color-text-warning)', label: 'Strongly rec.' },
                                        recommended: { bg: 'var(--color-background-success)', text: 'var(--color-text-success)', label: 'Recommended' },
                                        optional: { bg: 'var(--color-background-secondary)', text: 'var(--color-text-secondary)', label: 'Optional' },
                                    }[item.priority];

                                    return (
                                        <div
                                            key={idx}
                                            style={{
                                                background: 'var(--color-background-primary)',
                                                border: '1px solid var(--color-border-tertiary)',
                                                borderRadius: 'var(--border-radius-md)',
                                                padding: '1rem',
                                                display: 'flex',
                                                justifyContent: 'space-between',
                                                alignItems: 'flex-start',
                                                gap: '12px',
                                            }}
                                        >
                                            <div style={{ flex: 1 }}>
                                                <div style={{ fontSize: '14px', fontWeight: '500', marginBottom: '0.25rem', color: 'var(--color-text-primary)' }}>
                                                    Grade {item.grade}: {item.course}
                                                </div>
                                                <div style={{ fontSize: '13px', color: 'var(--color-text-secondary)' }}>
                                                    {item.reason}
                                                </div>
                                            </div>
                                            <div
                                                style={{
                                                    background: priorityColor.bg,
                                                    color: priorityColor.text,
                                                    fontSize: '11px',
                                                    fontWeight: '500',
                                                    padding: '4px 8px',
                                                    borderRadius: 'var(--border-radius-md)',
                                                    whiteSpace: 'nowrap',
                                                }}
                                            >
                                                {priorityColor.label}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>

                        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(240px, 1fr))', gap: '12px', marginBottom: '2rem' }}>
                            <div style={{ background: 'var(--color-background-tertiary)', borderRadius: 'var(--border-radius-md)', padding: '1rem' }}>
                                <div style={{ fontSize: '12px', color: 'var(--color-text-secondary)', marginBottom: '0.5rem' }}>
                                    Total science years recommended
                                </div>
                                <div style={{ fontSize: '24px', fontWeight: '500', color: 'var(--color-text-primary)' }}>
                                    3–4 years
                                </div>
                            </div>
                            <div style={{ background: 'var(--color-background-tertiary)', borderRadius: 'var(--border-radius-md)', padding: '1rem' }}>
                                <div style={{ fontSize: '12px', color: 'var(--color-text-secondary)', marginBottom: '0.5rem' }}>
                                    Graduation requirement
                                </div>
                                <div style={{ fontSize: '24px', fontWeight: '500', color: 'var(--color-text-primary)' }}>
                                    3 years (minimum)
                                </div>
                            </div>
                        </div>

                        <div style={{ background: 'var(--color-background-primary)', border: '1px solid var(--color-border-info)', borderRadius: 'var(--border-radius-lg)', padding: '1.5rem', marginBottom: '2rem' }}>
                            <div style={{ fontSize: '13px', color: 'var(--color-text-secondary)', marginBottom: '0.5rem' }}>
                                💡 Pro tip
                            </div>
                            <p style={{ fontSize: '14px', color: 'var(--color-text-primary)', margin: 0, lineHeight: '1.6' }}>
                                Talk with your guidance counselor about your specific goals. They can help you customize this plan based on your strengths, interests, and college/career requirements.
                            </p>
                        </div>

                        <button
                            onClick={handleReset}
                            style={{
                                width: '100%',
                                padding: '12px',
                                background: 'var(--color-background-primary)',
                                border: '1px solid var(--color-border-secondary)',
                                borderRadius: 'var(--border-radius-md)',
                                cursor: 'pointer',
                                fontSize: '14px',
                                fontWeight: '500',
                                color: 'var(--color-text-primary)',
                                transition: 'all 0.2s',
                            }}
                            onMouseEnter={(e) => {
                                e.currentTarget.style.background = 'var(--color-background-secondary)';
                            }}
                            onMouseLeave={(e) => {
                                e.currentTarget.style.background = 'var(--color-background-primary)';
                            }}
                        >
                            Explore another pathway
                        </button>
                    </div>
                );
            };

            return (
                <div style={{ minHeight: '100vh', background: 'transparent' }}>
                    {screen === 'welcome' && renderWelcome()}
                    {screen === 'interests' && renderInterests()}
                    {screen === 'recommendations' && renderRecommendations()}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ScienceCoursePlanner />);
    </script>
</body>
</html>
