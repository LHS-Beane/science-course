<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Science Course Pathway Planner</title>
  <style>
    :root {
      --bg: #f7fafc;
      --surface: #ffffff;
      --surface-2: #f1f5f9;
      --text: #0f172a;
      --muted: #64748b;
      --border: #dbe3ee;
      --blue: #2563eb;
      --blue-soft: #dbeafe;
      --green: #15803d;
      --green-soft: #dcfce7;
      --amber: #b45309;
      --amber-soft: #fef3c7;
      --purple: #7c3aed;
      --purple-soft: #ede9fe;
      --red: #b91c1c;
      --red-soft: #fee2e2;
      --shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
      --radius: 18px;
      --radius-sm: 12px;
      --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0b1120;
        --surface: #111827;
        --surface-2: #1f2937;
        --text: #f8fafc;
        --muted: #94a3b8;
        --border: #334155;
        --blue-soft: #172554;
        --green-soft: #14532d;
        --amber-soft: #451a03;
        --purple-soft: #2e1065;
        --red-soft: #450a0a;
        --shadow: 0 18px 45px rgba(0, 0, 0, 0.35);
      }
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: var(--font);
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.14), transparent 34rem),
        radial-gradient(circle at top right, rgba(124, 58, 237, 0.12), transparent 32rem),
        var(--bg);
      color: var(--text);
    }
    button, input, select { font: inherit; }
    button { cursor: pointer; }
    .app { min-height: 100vh; }
    .hero {
      max-width: 1120px;
      margin: 0 auto;
      padding: 42px 20px 22px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 30px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 750;
      letter-spacing: -0.02em;
    }
    .brand-mark {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      color: white;
      box-shadow: var(--shadow);
    }
    .hero-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.25fr) minmax(280px, 0.75fr);
      gap: 24px;
      align-items: stretch;
    }
    .hero-card, .panel, .path-card, .mini-card {
      background: rgba(255,255,255,0.84);
      border: 1px solid rgba(219, 227, 238, 0.9);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }
    @media (prefers-color-scheme: dark) {
      .hero-card, .panel, .path-card, .mini-card { background: rgba(17, 24, 39, 0.86); }
    }
    .hero-card { padding: 34px; }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--blue);
      background: var(--blue-soft);
      padding: 7px 11px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 18px;
    }
    h1 {
      margin: 0 0 16px;
      font-size: clamp(32px, 5vw, 56px);
      line-height: 1.02;
      letter-spacing: -0.055em;
    }
    .lead {
      margin: 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.65;
      max-width: 760px;
    }
    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 26px;
    }
    .btn {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 16px;
      font-weight: 750;
      color: var(--text);
      background: var(--surface);
      transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease;
    }
    .btn:hover { transform: translateY(-1px); border-color: var(--blue); }
    .btn.primary { background: linear-gradient(135deg, var(--blue), var(--purple)); color: white; border-color: transparent; }
    .btn.ghost { background: transparent; }
    .side-panel { padding: 24px; }
    .side-title { font-weight: 800; margin: 0 0 14px; }
    .side-list { display: grid; gap: 12px; }
    .side-item {
      display: grid;
      grid-template-columns: 38px 1fr;
      gap: 12px;
      align-items: start;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--surface);
    }
    .side-icon { font-size: 24px; }
    .side-item b { display:block; font-size: 14px; margin-bottom: 2px; }
    .side-item span { color: var(--muted); font-size: 13px; line-height: 1.45; }
    .main {
      max-width: 1120px;
      margin: 0 auto;
      padding: 8px 20px 60px;
    }
    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 16px;
      margin: 34px 0 16px;
    }
    .section-title h2 { margin: 0; font-size: 26px; letter-spacing: -0.03em; }
    .section-title p { margin: 6px 0 0; color: var(--muted); line-height: 1.55; }
    .panel { padding: 22px; }
    .grid { display: grid; gap: 14px; }
    .grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .grid-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .option {
      text-align: left;
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: var(--radius-sm);
      padding: 15px;
      min-height: 112px;
      transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease;
    }
    .option:hover { transform: translateY(-2px); border-color: var(--blue); }
    .option.selected { border-color: var(--blue); background: var(--blue-soft); }
    .option .icon { font-size: 26px; display: block; margin-bottom: 8px; }
    .option b { display: block; font-size: 15px; margin-bottom: 6px; }
    .option span { display: block; font-size: 13px; color: var(--muted); line-height: 1.45; }
    .controls { display: grid; gap: 14px; grid-template-columns: repeat(3, minmax(0, 1fr)); }
    label { display: grid; gap: 7px; font-size: 13px; font-weight: 750; }
    select, input {
      width: 100%;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      border-radius: 12px;
      padding: 11px 12px;
      outline: none;
    }
    select:focus, input:focus { border-color: var(--blue); }
    .interest-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 12px; }
    .pill-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .pill {
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      border-radius: 999px;
      padding: 8px 11px;
      font-size: 13px;
      font-weight: 700;
    }
    .pill.selected { background: var(--purple-soft); border-color: var(--purple); color: var(--text); }
    .results-layout { display: grid; grid-template-columns: minmax(0, 0.95fr) minmax(0, 1.05fr); gap: 18px; align-items: start; }
    .path-card { padding: 20px; }
    .path-head { display:flex; gap: 14px; align-items:flex-start; margin-bottom: 14px; }
    .path-icon { font-size: 32px; }
    .path-head h3 { margin: 0 0 5px; font-size: 20px; letter-spacing: -0.025em; }
    .path-head p { margin: 0; color: var(--muted); line-height: 1.5; font-size: 14px; }
    .tag-row { display:flex; flex-wrap: wrap; gap: 8px; margin: 14px 0; }
    .tag { font-size: 12px; border-radius:999px; padding: 6px 9px; font-weight: 800; background: var(--surface-2); color: var(--muted); border: 1px solid var(--border); }
    .tag.blue { background: var(--blue-soft); color: var(--blue); }
    .tag.green { background: var(--green-soft); color: var(--green); }
    .tag.amber { background: var(--amber-soft); color: var(--amber); }
    .tag.purple { background: var(--purple-soft); color: var(--purple); }
    .sequence { display:grid; gap: 10px; }
    .course-row {
      display: grid;
      grid-template-columns: 72px minmax(0, 1fr);
      gap: 12px;
      padding: 13px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
    }
    .grade-badge {
      display: grid;
      place-items: center;
      background: var(--surface-2);
      border-radius: 12px;
      font-weight: 900;
      color: var(--muted);
      min-height: 54px;
    }
    .course-row b { display:block; margin-bottom: 4px; }
    .course-row p { margin:0; color: var(--muted); font-size: 13px; line-height: 1.45; }
    .note-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 12px; }
    .mini-card { box-shadow: none; padding: 16px; }
    .mini-card h4 { margin: 0 0 8px; font-size: 15px; }
    .mini-card p, .mini-card li { color: var(--muted); font-size: 13px; line-height: 1.5; }
    .mini-card ul { margin: 0; padding-left: 18px; }
    .all-pathways { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 14px; }
    .compact-path { background: var(--surface); border:1px solid var(--border); border-radius: 16px; padding: 16px; }
    .compact-path h4 { margin: 0 0 6px; }
    .compact-path p { margin:0 0 10px; color: var(--muted); font-size:13px; line-height:1.45; }
    .checklist { display:grid; gap: 9px; }
    .check { display:flex; gap:10px; color: var(--muted); font-size: 13px; line-height:1.45; }
    .check:before { content:"✓"; color: var(--green); font-weight: 900; }
    .warning-box, .tip-box {
      border-radius: 16px;
      padding: 16px;
      line-height: 1.55;
      font-size: 14px;
    }
    .warning-box { background: var(--amber-soft); color: var(--text); border: 1px solid rgba(180, 83, 9, 0.28); }
    .tip-box { background: var(--green-soft); color: var(--text); border: 1px solid rgba(21, 128, 61, 0.22); }
    .footer { color: var(--muted); font-size: 12px; text-align:center; padding: 24px; }

    @media (max-width: 860px) {
      .hero-grid, .results-layout, .grid-2, .grid-3, .grid-4, .controls, .note-grid { grid-template-columns: 1fr; }
      .hero-card { padding: 24px; }
      .topbar { align-items:flex-start; flex-direction:column; }
    }

    @media print {
      body { background: white; color: #000; }
      .hero, .builder, .all-section, .footer, .no-print { display: none !important; }
      .main { max-width: none; padding: 0; }
      .results-layout { grid-template-columns: 1fr; }
      .path-card, .panel, .mini-card { box-shadow: none; border: 1px solid #bbb; break-inside: avoid; background: white; }
      .section-title { margin-top: 0; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const { useMemo, useState } = React;

    const goals = [
      { id: "college4", icon: "🎓", title: "4-Year College", desc: "Bachelor degree, selective admissions, STEM majors, pre-professional tracks." },
      { id: "college2", icon: "🏫", title: "2-Year / Community College", desc: "Associate degree, transfer pathway, flexible entry into technical or college programs." },
      { id: "careertech", icon: "🛠️", title: "Career Tech / Trade", desc: "Apprenticeships, certifications, hands-on technical career preparation." },
      { id: "military", icon: "🛡️", title: "Military / Public Service", desc: "Military, fire, EMS, law enforcement, safety, service, and leadership routes." },
      { id: "workforce", icon: "💼", title: "Direct Workforce", desc: "Practical science literacy and career-ready skills after graduation." },
      { id: "undecided", icon: "🧭", title: "Undecided / Exploring", desc: "Keep doors open while discovering strengths, interests, and future options." },
    ];

    const interests = [
      { id: "health", icon: "🫀", label: "Health, medicine, nursing, sports medicine" },
      { id: "engineering", icon: "⚙️", label: "Engineering, physics, aerospace, robotics" },
      { id: "chemistry", icon: "⚗️", label: "Chemistry, pharmacy, materials, lab science" },
      { id: "environment", icon: "🌎", label: "Earth, environment, geology, conservation" },
      { id: "forensics", icon: "🧬", label: "Forensics, criminal justice, investigation" },
      { id: "computer", icon: "💻", label: "Computers, drones, coding, data, AI" },
      { id: "trades", icon: "🔧", label: "HVAC, electrical, plumbing, construction" },
      { id: "auto", icon: "🚗", label: "Automotive, diesel, mechanics, powersports" },
      { id: "manufacturing", icon: "🏭", label: "Welding, CNC, manufacturing, machining" },
      { id: "outdoor", icon: "🌲", label: "Agriculture, wildlife, parks, outdoor work" },
      { id: "business", icon: "📈", label: "Business, entrepreneurship, management" },
      { id: "teaching", icon: "📚", label: "Teaching, coaching, science communication" },
    ];

    const courseCatalog = {
      bio: { name: "Biology", why: "Living systems, ecology, cells, genetics, and scientific thinking." },
      honorsBio: { name: "Honors Biology", why: "Stronger pace and depth for college-bound science students." },
      physSci: { name: "Physical Science", why: "Foundational chemistry, physics, energy, forces, and practical problem solving." },
      chem: { name: "Chemistry", why: "Matter, reactions, bonding, measurement, and lab reasoning." },
      honorsChem: { name: "Honors Chemistry", why: "Best preparation for college science, engineering, medicine, and AP-level work." },
      chem2: { name: "Honors Chemistry 2", why: "Advanced chemical reasoning, equilibrium, reactions, and stronger college prep." },
      organic: { name: "Organic Chemistry", why: "Excellent for medicine, pharmacy, biology, chemistry, and lab science interests." },
      physics: { name: "Physics", why: "Motion, forces, energy, electricity, waves, and real-world problem solving." },
      apPhysics: { name: "AP Physics 1", why: "High-rigor algebra-based physics for college-bound STEM students." },
      anatomy: { name: "Anatomy", why: "Human body systems, medical vocabulary, and health career preparation." },
      forensics: { name: "Forensic Science", why: "Applied science through evidence, investigation, chemistry, biology, and reasoning." },
      geology: { name: "Geology / Earth Science", why: "Rocks, minerals, hazards, plate tectonics, resources, and environmental connections." },
      astronomy: { name: "Astronomy", why: "Space science, light, motion, gravity, stars, and scientific scale." },
    };

    const pathways = [
      {
        id: "pre-health",
        title: "Pre-Health / Medical Science",
        icon: "🫀",
        matches: { goals: ["college4", "college2", "undecided"], interests: ["health", "chemistry", "forensics"] },
        tags: ["College prep", "Lab heavy", "Anatomy recommended"],
        summary: "Best for students considering medicine, nursing, athletic training, veterinary science, biology, pharmacy, or health careers.",
        sequences: {
          advanced: ["honorsBio", "honorsChem", "anatomy", "chem2", "apPhysics", "organic"],
          balanced: ["bio", "chem", "anatomy", "physics", "forensics", "organic"],
          practical: ["bio", "physSci", "anatomy", "forensics", "chem"],
        },
        advice: ["Prioritize Chemistry and Anatomy.", "Take the most rigorous Biology and Chemistry level you can handle without sacrificing grades.", "Add Physics or AP Physics if you are aiming for competitive health science programs."],
      },
      {
        id: "engineering",
        title: "Engineering / Physics / Robotics",
        icon: "⚙️",
        matches: { goals: ["college4", "college2", "undecided"], interests: ["engineering", "computer", "manufacturing"] },
        tags: ["Most math dependent", "Physics essential", "AP recommended"],
        summary: "Best for mechanical, aerospace, civil, electrical, computer, robotics, architecture, or physics-focused students.",
        sequences: {
          advanced: ["honorsBio", "honorsChem", "apPhysics", "chem2", "astronomy"],
          balanced: ["bio", "chem", "physics", "apPhysics", "geology"],
          practical: ["physSci", "chem", "physics", "forensics"],
        },
        advice: ["Physics is the anchor course.", "Strong math placement matters: Algebra II/Precalculus pairs well with Physics/AP Physics.", "Chemistry is still important for engineering because materials, energy, and reactions show up everywhere."],
      },
      {
        id: "chem-lab",
        title: "Chemistry / Pharmacy / Lab Science",
        icon: "⚗️",
        matches: { goals: ["college4", "college2", "undecided"], interests: ["chemistry", "health", "forensics"] },
        tags: ["Chemistry core", "Strong college signal", "Great for labs"],
        summary: "Best for chemistry, pharmacy, materials science, toxicology, forensic lab work, environmental chemistry, or research interests.",
        sequences: {
          advanced: ["honorsBio", "honorsChem", "chem2", "organic", "apPhysics"],
          balanced: ["bio", "chem", "chem2", "organic", "physics"],
          practical: ["bio", "physSci", "chem", "forensics", "geology"],
        },
        advice: ["Take Chemistry before Organic Chemistry.", "Chemistry 2 is the strongest bridge to college lab science.", "Physics strengthens the pathway because instruments, energy, and forces connect to lab work."],
      },
      {
        id: "earth-environment",
        title: "Earth / Environmental / Outdoor Science",
        icon: "🌎",
        matches: { goals: ["college4", "college2", "careertech", "workforce", "undecided"], interests: ["environment", "outdoor", "trades"] },
        tags: ["Earth systems", "Practical", "Field connections"],
        summary: "Best for geology, environmental science, conservation, parks, natural resources, agriculture, meteorology, or outdoor careers.",
        sequences: {
          advanced: ["honorsBio", "honorsChem", "physics", "geology", "apPhysics"],
          balanced: ["bio", "chem", "geology", "physics", "forensics"],
          practical: ["physSci", "bio", "geology", "forensics", "chem"],
        },
        advice: ["Geology/Earth Science is a strong fit, but Chemistry and Physics help explain the systems behind it.", "Students interested in environmental careers should not skip Chemistry.", "Hands-on learners can connect this route to trades, utilities, mapping, and fieldwork."],
      },
      {
        id: "forensics-public",
        title: "Forensics / Criminal Justice / Public Safety",
        icon: "🧬",
        matches: { goals: ["college4", "college2", "military", "workforce", "undecided"], interests: ["forensics", "health", "chemistry"] },
        tags: ["Applied science", "Evidence reasoning", "Public safety"],
        summary: "Best for students interested in forensic science, law enforcement, criminal justice, fire investigation, EMS, or public service.",
        sequences: {
          advanced: ["honorsBio", "honorsChem", "anatomy", "forensics", "physics"],
          balanced: ["bio", "chem", "forensics", "anatomy", "physics"],
          practical: ["bio", "physSci", "forensics", "anatomy", "geology"],
        },
        advice: ["Forensics is strongest after students have a Biology/Chemistry foundation.", "Anatomy helps students interested in EMS, fire, or crime scene investigation.", "Physics supports crash analysis, ballistics concepts, motion, force, and evidence reconstruction."],
      },
      {
        id: "trades-tech",
        title: "Skilled Trades / Technical Systems",
        icon: "🔧",
        matches: { goals: ["careertech", "workforce", "college2", "military", "undecided"], interests: ["trades", "auto", "manufacturing", "business"] },
        tags: ["Hands-on", "Physics useful", "Career-ready"],
        summary: "Best for HVAC, electrical, plumbing, construction, automotive, welding, manufacturing, maintenance, and technical service work.",
        sequences: {
          advanced: ["bio", "honorsChem", "physics", "forensics", "geology"],
          balanced: ["physSci", "bio", "chem", "physics", "forensics"],
          practical: ["physSci", "bio", "physics", "forensics", "geology"],
        },
        advice: ["Physical Science and Physics connect directly to tools, electricity, fluids, pressure, motion, and energy.", "Chemistry helps with materials, corrosion, combustion, refrigerants, and safety.", "For students entering apprenticeship routes, grades, attendance, and reliability matter as much as course names."],
      },
      {
        id: "computer-drones",
        title: "Computers / Drones / Data / AI",
        icon: "💻",
        matches: { goals: ["college4", "college2", "careertech", "undecided"], interests: ["computer", "engineering", "business"] },
        tags: ["Tech pathway", "Physics + math", "Flexible"],
        summary: "Best for computer science, drone technology, data science, AI, cybersecurity, robotics, and technical business interests.",
        sequences: {
          advanced: ["honorsBio", "honorsChem", "apPhysics", "astronomy", "chem2"],
          balanced: ["bio", "chem", "physics", "astronomy", "forensics"],
          practical: ["physSci", "bio", "physics", "forensics", "astronomy"],
        },
        advice: ["Physics pairs well with drones, robotics, sensors, and engineering design.", "A solid Chemistry course keeps college STEM options open.", "Students should also stack math, coding, engineering, business, or media classes when available."],
      },
      {
        id: "exploration",
        title: "Undecided / Broad Science Explorer",
        icon: "🧭",
        matches: { goals: ["undecided", "college2", "workforce"], interests: ["business", "teaching", "outdoor", "health", "engineering", "forensics"] },
        tags: ["Flexible", "Keeps doors open", "Balanced"],
        summary: "Best for students who are not sure yet and want a strong science schedule that keeps future options open.",
        sequences: {
          advanced: ["honorsBio", "honorsChem", "apPhysics", "chem2", "organic"],
          balanced: ["bio", "chem", "physics", "forensics", "anatomy"],
          practical: ["physSci", "bio", "forensics", "geology", "physics"],
        },
        advice: ["Choose at least one life science, one physical science, and one applied science.", "Students who might attend college should take Chemistry if possible.", "Students who dislike traditional science may connect better through Forensics, Geology, Astronomy, or hands-on Physics."],
      },
    ];

    function scorePathway(path, selections) {
      let score = 0;
      if (path.matches.goals.includes(selections.goal)) score += 6;
      selections.interests.forEach(id => { if (path.matches.interests.includes(id)) score += 4; });
      if (selections.interests.length === 0 && selections.goal === "undecided") score += 2;
      if (selections.math === "advanced" && path.tags.join(" ").toLowerCase().includes("math")) score += 2;
      if (selections.rigor === "advanced" && ["pre-health", "engineering", "chem-lab"].includes(path.id)) score += 1;
      if (selections.rigor === "practical" && ["trades-tech", "forensics-public", "earth-environment"].includes(path.id)) score += 1;
      return score;
    }

    function buildSequence(path, selections) {
      const track = selections.rigor;
      const keys = path.sequences[track] || path.sequences.balanced;
      const startGrade = Number(selections.grade);
      const gradeSlots = [9, 10, 11, 12].filter(g => g >= startGrade);
      return gradeSlots.map((grade, i) => {
        const key = keys[Math.min(i, keys.length - 1)];
        return { grade, ...courseCatalog[key] };
      });
    }

    function App() {
      const [selections, setSelections] = useState({
        goal: "undecided",
        grade: "9",
        math: "onlevel",
        rigor: "balanced",
        interests: [],
        support: "balanced",
      });
      const [showAll, setShowAll] = useState(false);

      const ranked = useMemo(() => {
        return pathways
          .map(p => ({ ...p, score: scorePathway(p, selections) }))
          .sort((a, b) => b.score - a.score);
      }, [selections]);

      const topPath = ranked[0];
      const altPaths = ranked.slice(1, 4);
      const sequence = buildSequence(topPath, selections);
      const goal = goals.find(g => g.id === selections.goal);

      const toggleInterest = (id) => {
        setSelections(prev => {
          const exists = prev.interests.includes(id);
          const next = exists ? prev.interests.filter(x => x !== id) : [...prev.interests, id];
          return { ...prev, interests: next.slice(0, 4) };
        });
      };

      const set = (key, value) => setSelections(prev => ({ ...prev, [key]: value }));
      const reset = () => setSelections({ goal: "undecided", grade: "9", math: "onlevel", rigor: "balanced", interests: [], support: "balanced" });

      return (
        <div className="app">
          <header className="hero">
            <div className="topbar">
              <div className="brand"><div className="brand-mark">⚛</div><div>Science Course Pathway Planner</div></div>
              <button className="btn ghost no-print" onClick={() => window.print()}>Print / Save Recommendation</button>
            </div>
            <div className="hero-grid">
              <div className="hero-card">
                <div className="eyebrow">Student-facing advising tool</div>
                <h1>Build a science path that actually matches your future.</h1>
                <p className="lead">Choose a post-graduation goal, interests, grade level, math comfort, and course intensity. The planner recommends a pathway, explains why each course matters, and gives backup options so students can compare routes instead of guessing.</p>
                <div className="hero-actions no-print">
                  <a className="btn primary" href="#builder">Start planning</a>
                  <a className="btn" href="#all-pathways">View all pathways</a>
                </div>
              </div>
              <div className="panel side-panel">
                <h3 className="side-title">What students get</h3>
                <div className="side-list">
                  <div className="side-item"><div className="side-icon">🧭</div><div><b>Pathway match</b><span>Recommended route based on goals and interests.</span></div></div>
                  <div className="side-item"><div className="side-icon">📅</div><div><b>Grade-by-grade plan</b><span>Course suggestions from the student’s current grade forward.</span></div></div>
                  <div className="side-item"><div className="side-icon">🔁</div><div><b>Alternative options</b><span>Comparable pathways for students who are still exploring.</span></div></div>
                  <div className="side-item"><div className="side-icon">🖨️</div><div><b>Printable summary</b><span>Useful for counselor meetings, scheduling, and parent conversations.</span></div></div>
                </div>
              </div>
            </div>
          </header>

          <main className="main">
            <section id="builder" className="builder">
              <div className="section-title">
                <div><h2>1. Choose your direction</h2><p>This is not permanent. It just helps the planner start with the most realistic course options.</p></div>
              </div>
              <div className="panel grid grid-3">
                {goals.map(g => (
                  <button key={g.id} className={`option ${selections.goal === g.id ? "selected" : ""}`} onClick={() => set("goal", g.id)}>
                    <span className="icon">{g.icon}</span><b>{g.title}</b><span>{g.desc}</span>
                  </button>
                ))}
              </div>

              <div className="section-title">
                <div><h2>2. Add student details</h2><p>These choices adjust the course sequence so it fits where the student is right now.</p></div>
              </div>
              <div className="panel controls">
                <label>Current grade
                  <select value={selections.grade} onChange={e => set("grade", e.target.value)}>
                    <option value="9">9th grade</option>
                    <option value="10">10th grade</option>
                    <option value="11">11th grade</option>
                    <option value="12">12th grade</option>
                  </select>
                </label>
                <label>Math comfort
                  <select value={selections.math} onChange={e => set("math", e.target.value)}>
                    <option value="support">I need support with math</option>
                    <option value="onlevel">I am okay with on-level math</option>
                    <option value="advanced">I am strong in math / advanced track</option>
                  </select>
                </label>
                <label>Course intensity
                  <select value={selections.rigor} onChange={e => set("rigor", e.target.value)}>
                    <option value="practical">Practical / hands-on route</option>
                    <option value="balanced">Balanced route</option>
                    <option value="advanced">Honors / AP / college-prep route</option>
                  </select>
                </label>
              </div>

              <div className="section-title">
                <div><h2>3. Pick up to four interests</h2><p>Students often have mixed goals. Selecting multiple interests gives a better recommendation.</p></div>
                <button className="btn ghost" onClick={() => set("interests", [])}>Clear interests</button>
              </div>
              <div className="panel interest-grid">
                {interests.map(item => (
                  <button key={item.id} className={`option ${selections.interests.includes(item.id) ? "selected" : ""}`} onClick={() => toggleInterest(item.id)}>
                    <span className="icon">{item.icon}</span><b>{item.label}</b><span>{selections.interests.includes(item.id) ? "Selected" : "Click to add"}</span>
                  </button>
                ))}
              </div>
            </section>

            <section id="recommendation">
              <div className="section-title">
                <div><h2>Your recommended pathway</h2><p>Current match: <b>{goal.title}</b> · {selections.rigor === "advanced" ? "Honors/AP" : selections.rigor === "practical" ? "Practical" : "Balanced"} course intensity.</p></div>
                <div className="no-print"><button className="btn" onClick={reset}>Reset planner</button></div>
              </div>

              <div className="results-layout">
                <div className="path-card">
                  <div className="path-head"><div className="path-icon">{topPath.icon}</div><div><h3>{topPath.title}</h3><p>{topPath.summary}</p></div></div>
                  <div className="tag-row">
                    {topPath.tags.map((t, i) => <span key={t} className={`tag ${["blue","green","amber","purple"][i % 4]}`}>{t}</span>)}
                  </div>
                  <h4>Recommended course sequence</h4>
                  <div className="sequence">
                    {sequence.map(item => (
                      <div className="course-row" key={item.grade + item.name}>
                        <div className="grade-badge">{item.grade}</div>
                        <div><b>{item.name}</b><p>{item.why}</p></div>
                      </div>
                    ))}
                  </div>
                </div>

                <div className="grid">
                  <div className="panel">
                    <h3 style={{marginTop:0}}>Why this path fits</h3>
                    <div className="checklist">
                      {topPath.advice.map(a => <div className="check" key={a}>{a}</div>)}
                    </div>
                  </div>
                  <div className="note-grid">
                    <div className="mini-card">
                      <h4>Best next conversation</h4>
                      <p>Ask your counselor: “Does this sequence meet graduation requirements and keep my post-high-school options open?”</p>
                    </div>
                    <div className="mini-card">
                      <h4>Reality check</h4>
                      <p>The “best” class is the one that challenges you while still letting you learn deeply, earn strong grades, and stay mentally healthy.</p>
                    </div>
                  </div>
                  <div className="warning-box"><b>Important:</b> This planner is a guide, not a replacement for official scheduling. Course availability, prerequisites, graduation requirements, and teacher/counselor recommendations should be checked before finalizing a schedule.</div>
                  <div className="panel">
                    <h3 style={{marginTop:0}}>Strong alternative pathways</h3>
                    <div className="all-pathways">
                      {altPaths.map(p => (
                        <div className="compact-path" key={p.id}>
                          <h4>{p.icon} {p.title}</h4>
                          <p>{p.summary}</p>
                          <div className="tag-row">{p.tags.slice(0,2).map(t => <span className="tag" key={t}>{t}</span>)}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              </div>
            </section>

            <section id="all-pathways" className="all-section">
              <div className="section-title">
                <div><h2>Pathway library</h2><p>Use this section when students want to browse options before choosing a schedule.</p></div>
                <button className="btn ghost" onClick={() => setShowAll(!showAll)}>{showAll ? "Hide details" : "Show details"}</button>
              </div>
              <div className="all-pathways">
                {pathways.map(p => (
                  <div className="compact-path" key={p.id}>
                    <h4>{p.icon} {p.title}</h4>
                    <p>{p.summary}</p>
                    <div className="tag-row">{p.tags.map(t => <span className="tag" key={t}>{t}</span>)}</div>
                    {showAll && <div className="checklist">{p.advice.map(a => <div className="check" key={a}>{a}</div>)}</div>}
                  </div>
                ))}
              </div>
            </section>

            <section>
              <div className="section-title"><div><h2>Student scheduling reminders</h2><p>Useful advice to place at the bottom of the site for all students.</p></div></div>
              <div className="panel note-grid">
                <div className="mini-card"><h4>For college-bound students</h4><ul><li>Take Biology, Chemistry, and Physics if possible.</li><li>Use Honors/AP when your grades and skills support it.</li><li>Selective STEM programs like to see four years of science.</li></ul></div>
                <div className="mini-card"><h4>For hands-on career paths</h4><ul><li>Physical Science, Physics, Chemistry, and Forensics connect strongly to technical work.</li><li>Attendance, reliability, safety, and problem solving matter.</li><li>Choose classes that let you build, test, measure, and explain.</li></ul></div>
                <div className="mini-card"><h4>For undecided students</h4><ul><li>Keep the door open with a balanced science sequence.</li><li>Try one applied elective to discover what feels useful.</li><li>Do not avoid Chemistry too early if college is possible.</li></ul></div>
                <div className="mini-card"><h4>For students needing support</h4><ul><li>Choose a route that builds confidence instead of overload.</li><li>Ask about tutoring, study halls, and prerequisite skills.</li><li>A strong grade in the right course beats struggling silently in the wrong one.</li></ul></div>
              </div>
            </section>
          </main>
          <div className="footer">Built for student course planning. Customize course names, prerequisites, and graduation requirements to match your school.</div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
